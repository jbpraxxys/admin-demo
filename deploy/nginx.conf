server {
    listen 80;
    server_name demo.praxxystech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name demo.praxxystech.com;

    root /var/www/demo/public;
    index index.php index.html;

    # SSL managed by Certbot

    # Per-project static serving with Basic Auth
    location ~ ^/projects/([a-z0-9_-]+)/(.+)$ {
        alias /var/www/demo/public/projects/$1/$2;
        auth_basic "PRAXXYS Demo";
        auth_basic_user_file /var/www/demo/storage/htpasswd/$1;
        try_files $uri =404;
    }

    # Block directory listing
    location = /projects/ { return 403; }
    location ~ ^/projects/([a-z0-9_-]+)/?$ { return 403; }

    # Laravel app
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.ht { deny all; }

    # Catch-all 404
    error_page 404 /index.php;
}
